name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check pragmatiq tests
      - name: Mypy
        run: mypy pragmatiq
      - name: Pytest smoke
        run: >
          pytest
          tests/test_models.py
          tests/test_registry_cli.py
          tests/test_tokenizer.py
          tests/test_validate.py
          tests/test_synthetic_world.py
          tests/test_synthetic_labels.py
          tests/test_synthetic_generate.py
          tests/test_sharding_dataset.py
          tests/test_gnn.py::TestGraphBuilder
          tests/test_gnn.py::TestHandcrafted
          tests/test_training.py::TestOptim
          tests/test_training.py::TestPretrainer::test_checkpoint_contains_required_state
          tests/test_training.py::TestPretrainer::test_tokenizer_mismatch_refused
          tests/test_training.py::TestProbe::test_embed_records_notebook_api
          -q
          -x
          --durations=10

  tests:
    # The full test suite — the `quality` job above runs only a fast smoke subset,
    # so unit tests for finetuner / uplift / multitask / inference would otherwise
    # never run in CI. This job closes that coverage gap.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,serve]"
      - name: Full pytest
        run: pytest tests/ -q --durations=15

  python-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
      - name: Compatibility smoke tests
        run: >
          pytest
          tests/test_models.py
          tests/test_registry_cli.py
          tests/test_tokenizer.py
          tests/test_validate.py
          tests/test_synthetic_world.py
          -q

  package-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Build artifacts
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Smoke-install wheel and sdist
        run: |
          python -m venv /tmp/pragmatiq-wheel
          /tmp/pragmatiq-wheel/bin/python -m pip install --upgrade pip
          /tmp/pragmatiq-wheel/bin/python -m pip install --no-deps dist/pragmatiq-*.whl
          /tmp/pragmatiq-wheel/bin/python - <<'PY'
          from pathlib import Path
          from importlib.metadata import version
          import pragmatiq
          assert pragmatiq.__version__ == version("pragmatiq")
          assert (Path(pragmatiq.__file__).parent / "py.typed").exists()
          PY
          python -m venv /tmp/pragmatiq-sdist
          /tmp/pragmatiq-sdist/bin/python -m pip install --upgrade pip
          /tmp/pragmatiq-sdist/bin/python -m pip install --no-deps dist/pragmatiq-*.tar.gz
          /tmp/pragmatiq-sdist/bin/python - <<'PY'
          from pathlib import Path
          from importlib.metadata import version
          import pragmatiq
          assert pragmatiq.__version__ == version("pragmatiq")
          assert (Path(pragmatiq.__file__).parent / "py.typed").exists()
          PY

  gates:
    # Run the CI-scale acceptance checks on pushes and pull requests, so a PR can
    # never merge a failing check.
    runs-on: ubuntu-latest
    needs: [quality, python-compat, package-smoke]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev,serve]"
      - name: Synthetic data
        run: bash scripts/gates/gate_1.sh
      - name: Tokenizer
        run: bash scripts/gates/gate_2.sh
      - name: Sharding / padding-equivalence
        run: bash scripts/gates/gate_3.sh
      - name: Model
        run: bash scripts/gates/gate_4.sh
      - name: Training / resume / probe
        run: bash scripts/gates/gate_5.sh
      - name: AML GNN ablation
        run: bash scripts/gates/gate_6.sh
      - name: Inference / serving
        run: bash scripts/gates/gate_7.sh
      - name: Validate / nano e2e / packaging
        run: bash scripts/gates/gate_8.sh
