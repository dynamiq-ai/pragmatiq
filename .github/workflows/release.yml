name: publish

# Build and publish pragmatiq to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret required. One-time setup:
# on https://pypi.org/manage/project/pragmatiq/settings/publishing/, add a trusted
# publisher for owner `dynamiq-ai`, repo `pragmatiq`, workflow `release.yml`,
# environment `pypi`. A pre-release version (e.g. 0.1.0b1) publishes as a pre-release.
on:
  release:
    types: [published]

jobs:
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
